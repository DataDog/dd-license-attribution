version: 2
updates:
- package-ecosystem: pip
  directory: /
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  labels:
  - dependencies
  - python
  cooldown:
    default-days: 14
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  open-pull-requests-limit: 5
  labels:
  - dependencies
  - github-actions
  - security
  commit-message:
    prefix: deps(actions)
    prefix-development: deps(actions)
    include: scope
  rebase-strategy: auto
  cooldown:
    default-days: 14
