name: Run Tests to check CLIs are not fundamentally broken

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
          cache: "pip" # caching pip dependencies

      - name: Set up Golang
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # 6.3.0
        with:
          go-version: "1.23"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run the dd-license-attribution script with the --help flag
        run: |
          dd-license-attribution --help

      - name: Run the dd-license-attribution script against the Stratus Red Team repository only for root (quick fail)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dd-license-attribution generate-sbom-csv --only-root-project https://github.com/DataDog/stratus-red-team

      - name: Run the dd-license-attribution script against the dd-license-attribution repository with overrides
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # For PRs: Use mirror configuration to test against the PR branch
          # For main: Test against main branch directly (no mirror needed)
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
            # Use head repo so fork PRs clone the branch from the fork, not upstream
            MIRROR_URL="https://github.com/${{ github.event.pull_request.head.repo.full_name }}"
            echo "Testing PR branch: ${BRANCH_NAME}"
            echo "[{\"original_url\": \"https://github.com/DataDog/dd-license-attribution\", \"mirror_url\": \"${MIRROR_URL}\", \"ref_mapping\": {\"branch:main\": \"branch:${BRANCH_NAME}\"}}]" > mirrors.json
            dd-license-attribution generate-sbom-csv --override-spec=.ddla-overrides --use-mirrors=mirrors.json https://github.com/DataDog/dd-license-attribution > ddla-output.txt
          else
            echo "Testing main branch"
            dd-license-attribution generate-sbom-csv --override-spec=.ddla-overrides https://github.com/DataDog/dd-license-attribution > ddla-output.txt
          fi

          if ! cmp -s LICENSE-3rdparty.csv ddla-output.txt; then
            echo "Error: LICENSE-3rdparty.csv differs from ddla-output.txt"
            echo "Diff between files:"
            diff -u --color LICENSE-3rdparty.csv ddla-output.txt || true
            # Upload the output file as an artifact
            echo "Uploading ddla-output.txt as an artifact..."
            exit 1
          fi

      - name: Upload ddla-output.txt on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ddla-output
          path: ddla-output.txt
          if-no-files-found: error

      - name: Run dd-license-attribution with --ecosystem go against a known Go package
        run: |
          dd-license-attribution generate-sbom-csv --ecosystem go --no-gh-auth github.com/DataDog/datadog-go/v5/statsd > go-ecosystem-output.txt
          # Validate output is non-empty CSV with expected header
          head -1 go-ecosystem-output.txt | grep -iq "component.*origin.*license.*copyright"
          # Validate at least some dependencies were found
          line_count=$(wc -l < go-ecosystem-output.txt)
          if [ "$line_count" -lt 2 ]; then
            echo "Error: Expected at least 1 dependency in output, got $((line_count - 1))"
            exit 1
          fi
          echo "Go ecosystem test passed: $((line_count - 1)) dependencies found"

      - name: Run dd-license-attribution with --ecosystem go (pinned version)
        run: |
          dd-license-attribution generate-sbom-csv --ecosystem go --no-gh-auth github.com/stretchr/testify@v1.9.0 > go-pinned-output.txt
          head -1 go-pinned-output.txt | grep -iq "component.*origin.*license.*copyright"
          # testify has known deps (stretchr/objx, davecgh/go-spew, pmezard/go-difflib, gopkg.in/yaml.v3)
          grep -q "go-spew" go-pinned-output.txt || { echo "Expected go-spew dependency"; exit 1; }
          grep -q "go-difflib" go-pinned-output.txt || { echo "Expected go-difflib dependency"; exit 1; }
          echo "Go ecosystem pinned version test passed"

      - name: Upload go ecosystem output on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: go-ecosystem-output
          path: |
            go-ecosystem-output.txt
            go-pinned-output.txt
          if-no-files-found: ignore

      - name: Test generate-overrides command with clean CSV
        run: |
          dd-license-attribution generate-overrides LICENSE-3rdparty.csv -o test-overrides.json
